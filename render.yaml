services:
  # ── SkyWay: Express API + React frontend (single monorepo service) ────────────
  - type: web
    name: skyway
    runtime: node
    rootDir: .
    buildCommand: npm install --prefix client && npm run --prefix client build && npm install --prefix server
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # ── Set ALL of these in Render Dashboard → Environment tab ──────────────
      - key: MONGO_URI
        sync: false          # MongoDB Atlas connection string
      - key: JWT_SECRET
        sync: false          # Long random string for JWT signing
      - key: CLIENT_URL
        sync: false          # Your Render service URL, e.g. https://skyway.onrender.com
      - key: EMAIL_USER
        sync: false          # Gmail address for sending emails
      - key: EMAIL_PASS
        sync: false          # Gmail App Password (not your real password)
      - key: SKYSCANNER_RAPIDAPI_KEY
        sync: false          # RapidAPI key for flight search
      - key: FAST2SMS_API_KEY
        sync: false          # Fast2SMS key for OTP SMS (optional)
      - key: PAYEE_UPI_ID
        sync: false          # Your UPI ID for payments
      - key: RAZORPAY_KEY_ID
        sync: false          # Razorpay test/live key ID
      - key: RAZORPAY_KEY_SECRET
        sync: false          # Razorpay key secret
